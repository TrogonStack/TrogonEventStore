version: 2

updates:
  - package-ecosystem: "nuget"
    directory: "/src"
    schedule:
      interval: "monthly"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      nuget:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:30"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
