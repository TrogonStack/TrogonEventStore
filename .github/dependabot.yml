version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "09:30"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "monthly"
      time: "10:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      docs:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/src/EventStore.ClusterNode"
    schedule:
      interval: "monthly"
      time: "10:30"
      timezone: "America/New_York"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      node-ui:
        patterns:
          - "*"
