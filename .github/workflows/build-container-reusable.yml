name: Build Container - Reusable

on:
  workflow_call:
    inputs:
      container-runtime:
        required: true
        type: string
      runtime:
        required: true
        type: string
      test-group-name:
        required: false
        type: string
        default: all

jobs:
  build-container:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    name: ${{ format('{0} / {1}', inputs.container-runtime, inputs.test-group-name) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install net8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: eventstore
          build-args: |
            CONTAINER_RUNTIME=${{ inputs.container-runtime }}
            RUNTIME=${{ inputs.runtime }}
          secrets: |
            nuget_auth_token=${{ secrets.GITHUB_TOKEN }}
      - name: Verify Build
        run: |
          docker run --rm eventstore --insecure --what-if
      - name: Build Test Container
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          target: test
          tags: eventstore-test
          build-args: |
            CONTAINER_RUNTIME=${{ inputs.container-runtime }}
            RUNTIME=${{ inputs.runtime }}
          secrets: |
            nuget_auth_token=${{ secrets.GITHUB_TOKEN }}
      - name: Run Tests
        run: |
          docker run \
          --env TEST_GROUP="${{ inputs.test-group-name }}" \
          --volume $(pwd)/test-results:/build/test-results \
          --rm \
          eventstore-test
      - name: Normalize Test Result Permissions
        if: always()
        run: |
          if [ -d test-results ]; then
            sudo chown -R "$(id -u):$(id -g)" test-results
            sudo chmod -R u+rwX,go+rX test-results
          fi
      - name: Publish Test Results (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          path: test-results/test-results.html
          name: test-results-${{ inputs.container-runtime }}-${{ inputs.test-group-name }}.html
      - name: Publish Test Results (All)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ inputs.container-runtime }}-${{ inputs.test-group-name }}
          path: test-results
