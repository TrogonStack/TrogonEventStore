name: Ubuntu LTS ARM64

on:
  pull_request:
    paths-ignore:
      - "docs/**"
      - "samples/**"
      - "**.md"
  push:
    branches:
      - master
      - release/v*
    tags:
      - v*
    paths-ignore:
      - "docs/**"
      - "samples/**"
      - "**.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build-reusable.yml
    with:
      os: ubuntu-24.04-arm
      arch: arm64
    secrets: inherit
