syntax = "proto3";
package event_store.client.projections;
option java_package = "com.eventstore.dbclient.proto.projections";

import "google/protobuf/struct.proto";
import "shared.proto";

service Projections {
	rpc Create (CreateReq) returns (CreateResp);
	rpc Update (UpdateReq) returns (UpdateResp);
	rpc GetQuery (GetQueryReq) returns (GetQueryResp);
	rpc Delete (DeleteReq) returns (DeleteResp);
	rpc Statistics (StatisticsReq) returns (stream StatisticsResp);
	rpc Disable (DisableReq) returns (DisableResp);
	rpc Enable (EnableReq) returns (EnableResp);
	rpc Reset (ResetReq) returns (ResetResp);
	rpc Abort (AbortReq) returns (AbortResp);
	rpc State (StateReq) returns (StateResp);
	rpc Result (ResultReq) returns (ResultResp);
	rpc GetConfig (GetConfigReq) returns (GetConfigResp);
	rpc UpdateConfig (UpdateConfigReq) returns (UpdateConfigResp);
	rpc ReadEvents (ReadEventsReq) returns (ReadEventsResp);
	rpc RestartSubsystem (event_store.client.Empty) returns (event_store.client.Empty);
}

message CreateReq {
	Options options = 1;

	message Options {
		oneof mode {
			event_store.client.Empty one_time = 1;
			Transient transient = 2;
			Continuous continuous = 3;
		}
		string query = 4;
		string handler_type = 5;
		oneof enabled_option {
			bool enabled = 6;
			event_store.client.Empty no_enabled_option = 7;
		}
		optional string name = 8;
		bool checkpoints_enabled = 9;
		bool emit_enabled = 10;
		bool track_emitted_streams = 11;

		message Transient {
			string name = 1;
		}
		message Continuous {
			string name = 1;
			bool emit_enabled = 2;
			bool track_emitted_streams = 3;
		}
	}
}

message CreateResp {
}

message UpdateReq {
	Options options = 1;

	message Options {
		string name = 1;
		string query = 2;
		oneof emit_option {
			bool emit_enabled = 3;
			event_store.client.Empty no_emit_options = 4;
		}
	}
}

message UpdateResp {
}

message GetQueryReq {
	Options options = 1;

	message Options {
		string name = 1;
	}
}

message GetQueryResp {
	Details details = 1;

	message Details {
		string name = 1;
		string query = 2;
		bool emit_enabled = 3;
		string projection_type = 4;
		optional bool track_emitted_streams = 5;
		optional bool checkpoints_enabled = 6;
		string definition_json = 7;
		string output_config_json = 8;
	}
}

message DeleteReq {
	Options options = 1;

	message Options {
		string name = 1;
		bool delete_emitted_streams = 2;
		bool delete_state_stream = 3;
		bool delete_checkpoint_stream = 4;
	}
}

message DeleteResp {
}

message StatisticsReq {
	Options options = 1;
	message Options {
		oneof mode {
			string name = 1;
			event_store.client.Empty all = 2;
			event_store.client.Empty transient = 3;
			event_store.client.Empty continuous = 4;
			event_store.client.Empty one_time = 5;
			event_store.client.Empty all_non_transient = 6;
		}
	}
}

message StatisticsResp {
	Details details = 1;

	message Details {
		int64 coreProcessingTime = 1;
		int64 version = 2;
		int64 epoch = 3;
		string effectiveName = 4;
		int32 writesInProgress = 5;
		int32 readsInProgress = 6;
		int32 partitionsCached = 7;
		string status = 8;
		string stateReason = 9;
		string name = 10;
		string mode = 11;
		string position = 12;
		float progress = 13;
		string lastCheckpoint = 14;
		int64 eventsProcessedAfterRestart = 15;
		string checkpointStatus = 16;
		int64 bufferedEvents = 17;
		int32 writePendingEventsBeforeCheckpoint = 18;
		int32 writePendingEventsAfterCheckpoint = 19;
	}
}

message StateReq {
	Options options = 1;

	message Options {
		string name = 1;
		string partition = 2;
	}
}

message StateResp {
	google.protobuf.Value state = 1;
}

message ResultReq {
	Options options = 1;

	message Options {
		string name = 1;
		string partition = 2;
	}
}

message ResultResp {
	google.protobuf.Value result = 1;
}

message GetConfigReq {
	Options options = 1;

	message Options {
		string name = 1;
	}
}

message GetConfigResp {
	Details details = 1;

	message Details {
		bool emit_enabled = 1;
		bool track_emitted_streams = 2;
		int32 checkpoint_after_ms = 3;
		int32 checkpoint_handled_threshold = 4;
		int32 checkpoint_unhandled_bytes_threshold = 5;
		int32 pending_events_threshold = 6;
		int32 max_write_batch_length = 7;
		int32 max_allowed_writes_in_flight = 8;
		optional int32 projection_execution_timeout = 9;
	}
}

message UpdateConfigReq {
	Options options = 1;

	message Options {
		string name = 1;
		bool emit_enabled = 2;
		bool track_emitted_streams = 3;
		int32 checkpoint_after_ms = 4;
		int32 checkpoint_handled_threshold = 5;
		int32 checkpoint_unhandled_bytes_threshold = 6;
		int32 pending_events_threshold = 7;
		int32 max_write_batch_length = 8;
		int32 max_allowed_writes_in_flight = 9;
		optional int32 projection_execution_timeout = 10;
	}
}

message UpdateConfigResp {
}

message ResetReq {
	Options options = 1;

	message Options {
		string name = 1;
		bool write_checkpoint = 2;
	}
}

message ResetResp {
}

message AbortReq {
	Options options = 1;

	message Options {
		string name = 1;
	}
}

message AbortResp {
}

message EnableReq {
	Options options = 1;

	message Options {
		string name = 1;
	}
}

message EnableResp {
}

message DisableReq {
	Options options = 1;

	message Options {
		string name = 1;
		bool write_checkpoint = 2;
	}
}

message DisableResp {
}

message ReadEventsReq {
	Options options = 1;

	message Options {
		string query_sources_json = 1;
		string position_json = 2;
		int32 max_events = 3;
	}
}

message ReadEventsResp {
	Details details = 1;

	message Details {
		string correlation_id = 1;
		string reader_position_json = 2;
		repeated Event events = 3;

		message Event {
			string event_stream_id = 1;
			int64 event_number = 2;
			string event_type = 3;
			google.protobuf.Value data = 4;
			google.protobuf.Value metadata = 5;
			google.protobuf.Value link_metadata = 6;
			bool is_json = 7;
			string reader_position_json = 8;
		}
	}
}
