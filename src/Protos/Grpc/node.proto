syntax = "proto3";
package event_store.client.node;
option java_package = "com.eventstore.dbclient.proto.node";

import "google/protobuf/struct.proto";
import "shared.proto";

service NodeInformation {
	rpc Read(event_store.client.Empty) returns (NodeInfo);
	rpc Options(event_store.client.Empty) returns (NodeOptions);
}

message NodeInfo {
	string es_version = 1;
	string state = 2;
	map<string, bool> features = 3;
	AuthenticationInfo authentication = 4;
}

message AuthenticationInfo {
	string type = 1;
	map<string, string> properties = 2;
}

message NodeOptions {
	repeated NodeOption options = 1;
}

message NodeOption {
	string name = 1;
	string description = 2;
	string group = 3;
	string value = 4;
	string configuration_source = 5;
	string deprecation_message = 6;
	google.protobuf.Struct schema = 7;
}
